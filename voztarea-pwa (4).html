<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="VozTarea">
<meta name="theme-color" content="#0d0d18">
<title>VozTarea</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0d0d18; --s1:#141420; --s2:#1c1c2e; --border:#2e2e48;
  --r:#ff4d6d; --p:#b085f5; --p2:#d4aaff; --b:#48cae4;
  --g:#06d6a0; --y:#ffd166; --text:#eeeef8; --muted:#7070a0;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overscroll-behavior:none}
body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 45% at 15% 5%,rgba(176,133,245,.1) 0%,transparent 55%),radial-gradient(ellipse 50% 35% at 85% 85%,rgba(255,77,109,.08) 0%,transparent 55%);pointer-events:none;z-index:0}
.app{display:flex;flex-direction:column;min-height:100vh;position:relative;z-index:1}
.topbar{padding:calc(env(safe-area-inset-top,0px) + 14px) 20px 14px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);background:rgba(13,13,24,.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);position:sticky;top:0;z-index:100}
.app-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--p),var(--r));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;box-shadow:0 4px 14px rgba(176,133,245,.35)}
.app-name{font-family:'Syne',sans-serif;font-weight:800;font-size:1.2rem;background:linear-gradient(90deg,var(--text),var(--p2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.cloud-badge{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:.65rem;letter-spacing:.06em;transition:color .3s}
.cloud-dot{width:7px;height:7px;border-radius:50%;background:var(--y);flex-shrink:0;transition:background .3s}
@keyframes pulse-g{50%{opacity:.25}}
.scroll-area{flex:1;overflow-y:auto;padding:20px 16px calc(env(safe-area-inset-bottom,0px) + 24px)}
.rec-card{background:var(--s1);border:1px solid var(--border);border-radius:20px;padding:24px 20px 20px;margin-bottom:24px;position:relative;overflow:hidden}
.rec-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--p),transparent)}
.step-lbl{font-size:.62rem;text-transform:uppercase;letter-spacing:.12em;color:var(--p2);margin-bottom:14px;text-align:center;font-family:'Syne',sans-serif;font-weight:700}
.waveform{display:flex;align-items:center;justify-content:center;gap:3px;height:52px;margin-bottom:20px}
.wb{width:3px;background:var(--border);border-radius:4px;height:6px;transition:height .12s ease}
.wb.on{background:linear-gradient(180deg,var(--p2),var(--r))}
.btn-rec{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:18px;border:none;border-radius:14px;font-family:'Syne',sans-serif;font-weight:700;font-size:1.05rem;cursor:pointer;transition:all .15s;touch-action:manipulation}
.btn-rec.idle{background:linear-gradient(135deg,var(--p),var(--r));color:#fff;box-shadow:0 6px 24px rgba(176,133,245,.3)}
.btn-rec.idle:active{transform:scale(.97)}
.btn-rec.rec{background:var(--r);color:#fff;animation:pulse-rec 1.5s ease-in-out infinite}
@keyframes pulse-rec{0%,100%{box-shadow:0 0 0 0 rgba(255,77,109,.5)}50%{box-shadow:0 0 0 14px rgba(255,77,109,0)}}
.timer-row{display:none;align-items:center;justify-content:center;gap:8px;margin:12px 0}
.timer-row.show{display:flex}
.tdot{width:8px;height:8px;border-radius:50%;background:var(--r);animation:pulse-g 1s infinite}
.tval{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;color:var(--r)}
.step2{margin-top:18px;border-top:1px solid var(--border);padding-top:18px;display:none}
.ta-wrap{border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:12px}
.ta-lbl{padding:8px 14px;background:var(--s2);font-size:.6rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);border-bottom:1px solid var(--border)}
.ta{width:100%;background:transparent;border:none;outline:none;color:var(--text);font-family:'DM Mono',monospace;font-size:.9rem;line-height:1.6;resize:none;padding:12px 14px;min-height:64px}
.ta::placeholder{color:var(--muted)}
.btn-save{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;border-radius:12px;border:1px solid var(--g);background:rgba(6,214,160,.08);color:var(--g);font-family:'DM Mono',monospace;font-size:.9rem;cursor:pointer;transition:all .15s;touch-action:manipulation;font-weight:500}
.btn-save:active{background:rgba(6,214,160,.18);transform:scale(.98)}
.manual-link{text-align:center;margin-top:14px}
.manual-link button{background:none;border:none;color:var(--muted);font-family:'DM Mono',monospace;font-size:.72rem;cursor:pointer;text-decoration:underline;letter-spacing:.04em}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sec-title{font-family:'Syne',sans-serif;font-size:.8rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.12em}
.badge{padding:3px 10px;border-radius:20px;background:var(--s2);border:1px solid var(--border);font-size:.7rem;color:var(--p2)}
.tabs{display:flex;gap:6px;margin-bottom:16px}
.tab{padding:7px 16px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'DM Mono',monospace;font-size:.72rem;cursor:pointer;transition:all .15s;touch-action:manipulation}
.tab.on{background:var(--s2);border-color:var(--p);color:var(--p2)}
.status-bar{display:flex;align-items:center;gap:8px;padding:9px 14px;background:var(--s2);border:1px solid var(--border);border-radius:10px;margin-bottom:16px;font-size:.72rem;color:var(--muted)}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--g);flex-shrink:0;transition:background .3s}
.sdot.red{background:var(--r);animation:pulse-g 1.2s infinite}
.sdot.yellow{background:var(--y);animation:pulse-g 1.2s infinite}
.clear-btn{margin-left:auto;background:none;border:none;color:var(--muted);font-family:'DM Mono',monospace;font-size:.65rem;cursor:pointer;letter-spacing:.05em}
.clear-btn:active{color:var(--r)}
.task{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:10px;display:flex;gap:12px;align-items:flex-start;animation:slideIn .3s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.task.done{opacity:.5}
.task.done .task-text{text-decoration:line-through;color:var(--muted)}
.chk{width:22px;height:22px;border-radius:7px;border:2px solid var(--border);cursor:pointer;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .15s;touch-action:manipulation;font-size:13px;font-weight:700;color:#0a0a0f}
.chk.on{background:var(--g);border-color:var(--g)}
.task-body{flex:1;min-width:0}
.task-text{font-size:.875rem;line-height:1.55;margin-bottom:8px;word-break:break-word}
.task-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.task-time{font-size:.65rem;color:var(--muted)}
.tag{font-size:.62rem;padding:2px 8px;border-radius:10px}
.tag-v{background:rgba(176,133,245,.15);color:var(--p2);border:1px solid rgba(176,133,245,.25)}
.tag-t{background:rgba(72,202,228,.12);color:var(--b);border:1px solid rgba(72,202,228,.2)}
.del-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:4px 8px;border-radius:8px;transition:all .15s;touch-action:manipulation;flex-shrink:0}
.del-btn:active{background:rgba(255,77,109,.15);color:var(--r)}
.empty{text-align:center;padding:50px 20px;color:var(--muted)}
.empty-ico{font-size:44px;margin-bottom:14px;opacity:.35}
.empty-txt{font-size:.8rem;letter-spacing:.05em}
.loading-wrap{display:flex;flex-direction:column;align-items:center;gap:12px;padding:40px 20px;color:var(--muted);font-size:.8rem}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid rgba(176,133,245,.3);border-top-color:var(--p);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="app">

  <div class="topbar">
    <div class="app-icon">🎙️</div>
    <span class="app-name">VozTarea</span>
    <div class="cloud-badge" id="cloudBadge" style="color:var(--y)">
      <div class="cloud-dot" id="cloudDot" style="animation:pulse-g 1.2s infinite"></div>
      <span id="cloudLabel">conectando…</span>
    </div>
  </div>

  <div class="scroll-area">

    <div class="rec-card">
      <div class="step-lbl" id="stepLbl">PASO 1 — Grabá tu tarea</div>

      <div class="waveform" id="waveform"></div>

      <button class="btn-rec idle" id="btnRec" onclick="toggleRecord()">
        <span id="btnIco">🎤</span>
        <span id="btnTxt">Tocar para GRABAR</span>
      </button>

      <div class="timer-row" id="timerRow">
        <div class="tdot"></div>
        <span class="tval" id="timerVal">0:00</span>
        <span style="font-size:.7rem;color:var(--muted)">escuchando…</span>
      </div>

      <div class="step2" id="step2">
        <div class="ta-wrap">
          <div class="ta-lbl">✦ tarea — editá si hace falta</div>
          <textarea class="ta" id="transcriptTa" rows="3" placeholder="El texto aparece aquí mientras hablás…"></textarea>
        </div>
        <button class="btn-save" onclick="saveTask()">
          ＋ Guardar tarea en la nube
        </button>
      </div>

      <div class="manual-link">
        <button onclick="showManual()">✍️ O escribí la tarea directamente</button>
      </div>
    </div>

    <div class="sec-head">
      <span class="sec-title">Registro compartido</span>
      <span class="badge" id="badge">—</span>
    </div>

    <div class="tabs">
      <button class="tab on" onclick="setFilter('all',this)">Todas</button>
      <button class="tab" onclick="setFilter('pending',this)">Pendientes</button>
      <button class="tab" onclick="setFilter('done',this)">Hechas</button>
    </div>

    <div class="status-bar">
      <div class="sdot" id="sDot"></div>
      <span id="sText">Conectando con Firebase…</span>
      <button class="clear-btn" onclick="clearDone()">Limpiar hechas</button>
    </div>

    <div id="taskList">
      <div class="loading-wrap"><div class="spinner"></div><span>Cargando tareas…</span></div>
    </div>

  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
// ── FIREBASE ─────────────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyCon9Pe4NYaLOs3GduAO7swE7fDRX2XY4s",
  authDomain: "voztarea.firebaseapp.com",
  projectId: "voztarea",
  storageBucket: "voztarea.firebasestorage.app",
  messagingSenderId: "494241048261",
  appId: "1:494241048261:web:0708bed3dbac5a54a732ac"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const col = db.collection('tasks');

// ── STATE ─────────────────────────────────────────────────────────
let tasks = [];
let currentFilter = 'all';
let isRecording = false;
let recognition = null;
let accumulatedText = '';
let timerInt = null;
let secs = 0;

// ── WAVEFORM ──────────────────────────────────────────────────────
const wvEl = document.getElementById('waveform');
const bars = Array.from({length:28}, () => {
  const b = document.createElement('div');
  b.className = 'wb';
  b._max = 10 + Math.random() * 38;
  wvEl.appendChild(b);
  return b;
});
let wvInt = null;
function waveOn(on){
  clearInterval(wvInt);
  if(on){
    wvInt = setInterval(()=> bars.forEach(b => {
      b.style.height = (4 + Math.random() * b._max) + 'px';
      b.classList.add('on');
    }), 120);
  } else {
    bars.forEach(b => { b.style.height = '6px'; b.classList.remove('on'); });
  }
}

// ── FIREBASE LISTENER (tiempo real) ──────────────────────────────
col.orderBy('createdAt', 'desc').onSnapshot(snap => {
  tasks = snap.docs.map(d => ({id: d.id, ...d.data()}));
  renderTasks();
  setCloud('ok');
  setStatus('En vivo — sincronizado con Firebase ✓');
}, err => {
  setCloud('err');
  setStatus('Error de conexión', 'red');
  console.error(err);
});

// ── GUARDAR TAREA ─────────────────────────────────────────────────
async function saveTask(){
  const text = document.getElementById('transcriptTa').value.trim();
  if(!text){ setStatus('Escribí o grabá una tarea primero', 'yellow'); return; }
  const btn = document.querySelector('.btn-save');
  btn.textContent = 'Guardando…'; btn.disabled = true;
  try {
    await col.add({
      text,
      source: accumulatedText ? 'voice' : 'text',
      done: false,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    document.getElementById('transcriptTa').value = '';
    document.getElementById('step2').style.display = 'none';
    document.getElementById('stepLbl').textContent = 'PASO 1 — Grabá tu tarea';
    accumulatedText = '';
  } catch(e){
    setStatus('Error al guardar — revisá la conexión', 'red');
  }
  btn.textContent = '＋ Guardar tarea en la nube'; btn.disabled = false;
}

// ── ACCIONES DE TAREAS ────────────────────────────────────────────
async function toggleDone(id, current){
  await col.doc(id).update({done: !current});
}
async function deleteTask(id){
  await col.doc(id).delete();
}
async function clearDone(){
  const dones = tasks.filter(t => t.done);
  if(!dones.length){ setStatus('No hay tareas completadas'); return; }
  if(!confirm(`¿Eliminar ${dones.length} tarea(s) completada(s)?`)) return;
  const batch = db.batch();
  dones.forEach(t => batch.delete(col.doc(t.id)));
  await batch.commit();
}

// ── GRABACIÓN (Web Speech API) ────────────────────────────────────
function toggleRecord(){
  isRecording ? stopRec() : startRec();
}

function startRec(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){
    alert('Usá Chrome en Android o Safari en iPhone para grabar por voz.');
    return;
  }
  accumulatedText = '';
  document.getElementById('transcriptTa').value = '';
  document.getElementById('step2').style.display = 'block';
  document.getElementById('stepLbl').textContent = '🎤 Hablá — se transcribe frase a frase';

  recognition = new SR();
  recognition.lang = 'es-AR';
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  recognition.onresult = e => {
    const frase = e.results[0][0].transcript.trim();
    accumulatedText = accumulatedText ? accumulatedText + ' ' + frase : frase;
    document.getElementById('transcriptTa').value = accumulatedText;
  };
  recognition.onerror = e => {
    if(e.error === 'no-speech' && isRecording){ try{recognition.start()}catch(x){} return; }
    if(e.error === 'not-allowed'){ alert('Permiso de micrófono denegado.'); stopRec(); return; }
    if(isRecording) setTimeout(()=>{ try{recognition.start()}catch(x){} }, 200);
  };
  recognition.onend = () => {
    if(isRecording) try{recognition.start()}catch(x){}
  };

  try {
    recognition.start();
    isRecording = true;
    document.getElementById('btnRec').className = 'btn-rec rec';
    document.getElementById('btnIco').textContent = '⏹';
    document.getElementById('btnTxt').textContent = 'Tocar para DETENER';
    document.getElementById('timerRow').classList.add('show');
    setStatus('🔴 Escuchando… hablá tu tarea', 'red');
    waveOn(true);
    secs = 0;
    timerInt = setInterval(()=>{
      secs++;
      const m = Math.floor(secs/60), s = secs%60;
      document.getElementById('timerVal').textContent = `${m}:${s.toString().padStart(2,'0')}`;
    }, 1000);
  } catch(e){
    setStatus('Error al iniciar el micrófono', 'red');
  }
}

function stopRec(){
  isRecording = false;
  if(recognition){ try{recognition.stop()}catch(e){} recognition = null; }
  clearInterval(timerInt);
  document.getElementById('btnRec').className = 'btn-rec idle';
  document.getElementById('btnIco').textContent = '🎤';
  document.getElementById('btnTxt').textContent = 'Tocar para GRABAR';
  document.getElementById('timerRow').classList.remove('show');
  document.getElementById('stepLbl').textContent = 'PASO 2 — Revisá y guardá';
  waveOn(false);
  const txt = document.getElementById('transcriptTa').value.trim();
  setStatus(txt ? 'Transcripción lista ✓ — revisá y guardá' : 'No se detectó voz — intentá o escribí a mano');
}

function showManual(){
  accumulatedText = '';
  document.getElementById('transcriptTa').value = '';
  document.getElementById('step2').style.display = 'block';
  document.getElementById('stepLbl').textContent = 'Escribí tu tarea';
  setTimeout(()=> document.getElementById('transcriptTa').focus(), 100);
}

// ── RENDER ────────────────────────────────────────────────────────
function renderTasks(){
  const list = document.getElementById('taskList');
  let filtered = tasks;
  if(currentFilter === 'pending') filtered = tasks.filter(t => !t.done);
  if(currentFilter === 'done')    filtered = tasks.filter(t =>  t.done);

  const pending = tasks.filter(t => !t.done).length;
  document.getElementById('badge').textContent = `${pending} pendiente${pending!==1?'s':''}`;

  if(!filtered.length){
    const ico = {all:'📋',pending:'🎉',done:'✅'}[currentFilter];
    const msg = {all:'Sin tareas — ¡grabá la primera!',pending:'Todo al día 🎉',done:'Ninguna completada aún'}[currentFilter];
    list.innerHTML = `<div class="empty"><div class="empty-ico">${ico}</div><div class="empty-txt">${msg}</div></div>`;
    return;
  }

  list.innerHTML = filtered.map(t => {
    const d = t.createdAt?.toDate ? t.createdAt.toDate() : new Date();
    const ds = d.toLocaleDateString('es-AR',{day:'2-digit',month:'short'});
    const ts = d.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
    return `
    <div class="task ${t.done?'done':''}">
      <div class="chk ${t.done?'on':''}" onclick="toggleDone('${t.id}',${t.done})">${t.done?'✓':''}</div>
      <div class="task-body">
        <div class="task-text">${esc(t.text)}</div>
        <div class="task-meta">
          <span class="task-time">📅 ${ds} · ${ts}</span>
          <span class="tag ${t.source==='voice'?'tag-v':'tag-t'}">${t.source==='voice'?'🎙 voz':'⌨ texto'}</span>
        </div>
      </div>
      <button class="del-btn" onclick="deleteTask('${t.id}')">✕</button>
    </div>`;
  }).join('');
}

function setFilter(f, el){
  currentFilter = f;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  el.classList.add('on');
  renderTasks();
}

function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function setStatus(msg, dot=''){
  document.getElementById('sText').textContent = msg;
  document.getElementById('sDot').className = 'sdot' + (dot?' '+dot:'');
}

function setCloud(state){
  const dot = document.getElementById('cloudDot');
  const lbl = document.getElementById('cloudLabel');
  const badge = document.getElementById('cloudBadge');
  const colors = {sync:'var(--y)', ok:'var(--g)', err:'var(--r)'};
  const labels = {sync:'sincronizando…', ok:'en vivo ✓', err:'sin conexión'};
  dot.style.background = colors[state];
  dot.style.animation = state === 'sync' ? 'pulse-g 1.2s infinite' : 'none';
  lbl.textContent = labels[state];
  badge.style.color = colors[state];
}

// ── PWA iOS hint ──────────────────────────────────────────────────
if(/iphone|ipad|ipod/i.test(navigator.userAgent) && !window.navigator.standalone){
  const h = document.createElement('div');
  h.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1c1c2e;border:1px solid #b085f5;border-radius:14px;padding:12px 18px;font-size:.75rem;color:#d4aaff;text-align:center;z-index:999;max-width:290px;line-height:1.6;box-shadow:0 8px 24px rgba(0,0,0,.4)';
  h.innerHTML = '📲 Instalá la app:<br><strong>Compartir</strong> → <strong>"Agregar a inicio"</strong> <button onclick="this.parentElement.remove()" style="background:none;border:none;color:#7070a0;float:right;cursor:pointer;font-size:16px;margin:-2px 0 0 8px">✕</button>';
  document.body.appendChild(h);
  setTimeout(()=>{ if(h.parentElement) h.remove(); }, 10000);
}
</script>
</body>
</html>
