const db = firebase.firestore();

// Storage
const Storage = {
    getOrders: (cb) => db.collection('manguerotes').onSnapshot(snap => {
        const orders = [];
        snap.forEach(doc => orders.push({ ...doc.data(), firestoreId: doc.id }));
        orders.sort((a, b) => new Date(b.updatedAt||0) - new Date(a.updatedAt||0));
        cb(orders);
    }, () => cb([])),

    saveOrder: async (order) => {
        try {
            const clean = JSON.parse(JSON.stringify(order, (k,v) => v === undefined ? '' : v));
            if (order.firestoreId) {
                await db.collection('manguerotes').doc(order.firestoreId).set(clean);
            } else {
                await db.collection('manguerotes').add(clean);
            }
            return true;
        } catch (e) {
            alert('Error al guardar: ' + e.message);
            return false;
        }
    }
};

// Orders List
function OrdersList({ onNew, onEdit }) {
    const [orders, setOrders] = useState([]);
    const [loading, setLoading] = useState(true);
    const [exporting, setExporting] = useState(false);

    useEffect(() => {
        const unsub = Storage.getOrders(o => { setOrders(o); setLoading(false); });
        return () => unsub();
    }, []);

    const exportToExcel = () => {
        if (orders.length === 0) {
            alert('No hay órdenes para exportar');
            return;
        }
        
        setExporting(true);
        
        try {
            const datos = orders.map(o => ({
                'MARCA': o.marca || '',
                'SERIE': o.serie || '',
                'PSI': o.psi || '',
                'LONGITUD': o.longitud || '',
                'ROSCA ENTRADA': o.roscaEntrada || '',
                'FECHA DE ENTRADA': o.fechaEntrada || '',
                'FECHA DE CALIBRACION': o.fechaCalibracion || '',
                'PRECINTO': o.precinto || '',
                'ORIGEN': o.origen || '',
                'DESTINO': o.destino || '',
                'FECHA DE SALIDA': o.fechaSalida || '',
                'OV': o.ov || '',
                'REMITO': o.remito || ''
            }));
            
            const XLSX = window.XLSX;
            const ws = XLSX.utils.json_to_sheet(datos);
            
            ws['!cols'] = [
                {wch: 15}, {wch: 15}, {wch: 10}, {wch: 12},
                {wch: 15}, {wch: 18}, {wch: 20}, {wch: 12},
                {wch: 20}, {wch: 20}, {wch: 18}, {wch: 12}, {wch: 12}
            ];
            
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Manguerotes');
            
            const fecha = new Date().toLocaleDateString('es-AR', {month: 'long', year: 'numeric'}).toUpperCase();
            XLSX.writeFile(wb, `MANGUEROTES_${fecha}.xlsx`);
            
            alert(`✅ Exportados ${orders.length} manguerotes a Excel`);
        } catch (error) {
            console.error('Error exportando:', error);
            alert('Error al exportar: ' + error.message);
        } finally {
            setExporting(false);
        }
    };

    if (loading) return <div className="card"><div className="loading"><div style={{fontSize:'48px'}}>⏳</div><p>Cargando órdenes...</p></div></div>;

    if (!orders.length) return (
        <div className="card">
            <div className="empty-state">
                <div style={{fontSize:'64px',marginBottom:'20px'}}>🔧</div>
                <h3>No hay órdenes registradas</h3>
                <p>Crea tu primera orden de trabajo</p>
                <button className="btn btn-primary" style={{marginTop:'20px'}} onClick={onNew}>➕ Nueva Orden</button>
            </div>
        </div>
    );

    return (
        <div>
            <div style={{display:'flex', gap:'12px', marginBottom:'20px'}}>
                <button className="btn btn-primary" style={{flex:1}} onClick={onNew}>
                    ➕ Nueva Orden
                </button>
                <button className="btn btn-success" style={{flex:1}} onClick={exportToExcel} disabled={exporting}>
                    {exporting ? '⏳ Exportando...' : '📊 Exportar a Excel'}
                </button>
            </div>
            {orders.map(o => (
                <div key={o.firestoreId||o.id} className="order-card" onClick={() => onEdit(o)}>
                    <div className="order-header">
                        <div className="order-title">{o.otNumber} — {o.serie || 'Sin serie'}</div>
                        <span className={`order-badge ${o.status === 'complete' ? 'badge-complete' : 'badge-draft'}`}>
                            {o.status === 'complete' ? 'Completo' : 'Borrador'}
                        </span>
                    </div>
                    <div className="order-details">
                        <div><span className="detail-label">Marca:</span> {o.marca || '-'}</div>
                        <div><span className="detail-label">PSI:</span> {o.psi || '-'}</div>
                        <div><span className="detail-label">Longitud:</span> {o.longitud || '-'}</div>
                        <div><span className="detail-label">Fecha:</span> {o.fecha || '-'}</div>
                        <div><span className="detail-label">Destino:</span> {o.destino || '-'}</div>
                        <div><span className="detail-label">OV:</span> {o.ov || '-'}</div>
                    </div>
                </div>
            ))}
        </div>
    );
}

// App
function App() {
    const [tab, setTab] = useState('list');
    const [editing, setEditing] = useState(null);
    const [toast, setToast] = useState(null);
    const [online, setOnline] = useState(navigator.onLine);

    useEffect(() => {
        const on = () => setOnline(true);
        const off = () => setOnline(false);
        window.addEventListener('online', on);
        window.addEventListener('offline', off);
        return () => { window.removeEventListener('online', on); window.removeEventListener('offline', off); };
    }, []);

    const showToast = (msg, type = 'success') => setToast({ msg, type });

    const handleSave = async (order) => {
        const ok = await Storage.saveOrder(order);
        if (ok) {
            showToast(order.status === 'draft' ? '💾 Borrador guardado' : '✅ Orden completada');
            setTab('list'); setEditing(null);
        } else {
            showToast('Error al guardar', 'error');
        }
    };

    return (
        <div className="app-container">
            <div className="app-header">
                <h1>ManguerCheck</h1>
                <div className="subtitle">Sistema de Calibración de Manguerotes</div>
                <div className="sync-status">
                    <div className="sync-dot" style={{background: online ? '#06D6A0' : '#FFB800'}}></div>
                    {online ? 'Sincronizado ☁️' : 'Offline'}
                </div>
            </div>

            <div className="nav-tabs">
                <button className={`nav-tab ${tab==='list'?'active':''}`} onClick={() => setTab('list')}>📋 Órdenes</button>
                <button className={`nav-tab ${tab==='new'?'active':''}`} onClick={() => { setEditing(null); setTab('new'); }}>➕ Nueva OT</button>
            </div>

            {tab === 'list'
                ? <OrdersList onNew={() => { setEditing(null); setTab('new'); }} onEdit={o => { setEditing(o); setTab('new'); }} />
                : <NewOrderForm onSave={handleSave} editingOrder={editing} />
            }

            {toast && <Toast message={toast.msg} type={toast.type} onClose={() => setToast(null)} />}
        </div>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
