const uploadPhoto = async (base64) => {
    try {
        const fd = new FormData();
        fd.append('file', base64);
        fd.append('upload_preset', UPLOAD_PRESET);
        fd.append('folder', 'valvucheck');
        const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, { method: 'POST', body: fd });
        if (!res.ok) return base64;
        const data = await res.json();
        return data.secure_url;
    } catch { return base64; }
};

// Storage
const Storage = {
    getOrders: (cb) => db.collection('workOrders').onSnapshot(snap => {
        const orders = [];
        snap.forEach(doc => orders.push({ ...doc.data(), firestoreId: doc.id }));
        orders.sort((a, b) => new Date(b.updatedAt||0) - new Date(a.updatedAt||0));
        cb(orders);
    }, () => cb([])),

    saveOrder: async (order) => {
        try {
            const clean = JSON.parse(JSON.stringify(order, (k,v) => v === undefined ? '' : v));
            if (order.firestoreId) {
                await db.collection('workOrders').doc(order.firestoreId).set(clean);
            } else {
                await db.collection('workOrders').add(clean);
            }
            return true;
        } catch (e) {
            alert('Error al guardar: ' + e.message);
            return false;
        }
    }

// Photo slot - one photo per slot
function PhotoSlot({ label, photo, onChange, uploading }) {
    const handleFile = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async (ev) => {
            const url = await uploadPhoto(ev.target.result);
            onChange(url);
        };
        reader.readAsDataURL(file);
    };

    return (
        <div>
            {photo ? (
                <div className="photo-thumb">
                    <img src={photo} alt={label} />
                    <button className="photo-remove" onClick={() => onChange('')}>×</button>

            ) : (

    );

// Signature
function SignaturePad({ sig, onChange }) {
    const ref = useRef(null);
    const [drawing, setDrawing] = useState(false);
    useEffect(() => {
        if (!ref.current) return;
        const ctx = ref.current.getContext('2d');
        ctx.lineWidth = 2; ctx.lineCap = 'round'; ctx.strokeStyle = '#000';
        if (sig) { const img = new Image(); img.onload = () => ctx.drawImage(img, 0, 0); img.src = sig; }
    }, []);
    const pos = (e) => {
        const r = ref.current.getBoundingClientRect();
        return { x: (e.clientX||e.touches[0].clientX)-r.left, y: (e.clientY||e.touches[0].clientY)-r.top };
    };
    const start = (e) => { setDrawing(true); const ctx = ref.current.getContext('2d'); const p = pos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); };
    const draw = (e) => { if (!drawing) return; e.preventDefault(); const ctx = ref.current.getContext('2d'); const p = pos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); };
    const stop = () => { if (drawing) { setDrawing(false); onChange(ref.current.toDataURL()); } };
    const clear = () => { const ctx = ref.current.getContext('2d'); ctx.clearRect(0, 0, ref.current.width, ref.current.height); onChange(''); };
    return (
        <div>
            <canvas ref={ref} className="signature-canvas" width={700} height={150}
                onMouseDown={start} onMouseMove={draw} onMouseUp={stop} onMouseLeave={stop}
                onTouchStart={start} onTouchMove={draw} onTouchEnd={stop} />
            <button className="btn btn-secondary" style={{marginTop:'8px', padding:'8px 16px', fontSize:'13px'}} onClick={clear}>Limpiar</button>
        </div>
    );
}

    <td class="gray">CLIENTE:</td><td colspan="3">${order.cliente || ''}</td>
  </tr>
  <tr>
    <td class="gray">UBICACIÓN / PRESIÓN:</td><td>${order.ubicacion || ''}</td>
    <td class="gray">EQUIPO:</td><td>${order.equipo || ''}</td>
  </tr>
  <tr>

<table style="width:100%;border:1px solid #333;">
  <tr style="border-bottom:1px solid #333;">
    <td style="width:25%;border-right:1px solid #333;padding:3px;"><strong>MARCA:</strong> ${order.marca || ''}</td>
    <td style="width:25%;border-right:1px solid #333;padding:3px;"><strong>MODELO:</strong> ${order.modelo || ''}</td>
    <td style="width:25%;border-right:1px solid #333;padding:3px;"><strong>N° SERIE:</strong> ${order.nroSerie || ''}</td>
    <td style="width:25%;padding:3px;"><strong>PRESIÓN (BAR):</strong> ${order.presion || ''}</td>
  </tr>
  <tr style="border-bottom:1px solid #333;">
    <td style="border-right:1px solid #333;padding:3px;" colspan="2"><strong>FLUIDO:</strong> ${order.fluido || ''}</td>
    <td style="border-right:1px solid #333;padding:3px;"><strong>PATRÓN UTILIZADO:</strong> ${order.patron || ''}</td>
    <td style="padding:3px;"><strong>TAMAÑO ENT. Y SAL.:</strong> ${order.tamano || ''}</td>
  </tr>
  <tr>
    <td style="border-right:1px solid #333;padding:3px;"><strong>TIPO CONEXIÓN:</strong> ${order.tipoConexion || ''}</td>
    <td style="padding:3px;" colspan="3"><strong>PRECINTO:</strong> ${order.precinto || ''}</td>
  </tr>
</table>

<div style="margin-top:6px;padding:4px;border:1px solid #333;">
  <strong>OBSERVACIONES:</strong> ${order.observaciones || ''}
</div>

</div>
<div style="display: flex; gap: 10px; margin-top: 20px; padding: 0 8mm;">
  <button class="no-print" onclick="window.print()" style="flex: 1; padding: 12px; background: #FF6B35; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 16px;">🖨️ Imprimir / PDF</button>
  <button class="no-print" onclick="descargarCertificado('${order.patron}')" style="flex: 1; padding: 12px; background: #004E89; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 16px;">📜 Descargar Certificado</button>
</div>
<script` + `>
function descargarCertificado(patron) {
  if (!patron) {
    alert('⚠️ No hay patrón seleccionado en el informe');
    return;
  }
  
  var certificados = {
    'MT1019-25': 'certificado_MT1019-25.pdf',
    'MT1020-25': 'certificado_MT1020-25.pdf',
    'MT1022-25': 'certificado_MT1022-25.pdf'
  };
  
  var archivo = certificados[patron];
  if (archivo) {
    window.open(archivo, '_blank');
  } else {
    alert('⚠️ Certificado no encontrado para el patrón: ' + patron);
  }
}
</script` + `>
</body></html>`;
        w.document.write(html);
        w.document.close();
    };
    
    const descargarCertificadoPatron = (patron) => {
        const certificados = {
            'MT1019-25': 'certificado_MT1019-25.pdf',
            'MT1020-25': 'certificado_MT1020-25.pdf',
            'MT1022-25': 'certificado_MT1022-25.pdf'
        };
        const archivo = certificados[patron];
        if (archivo) {
            window.open(archivo, '_blank');
        } else {
            alert('⚠️ Certificado no encontrado para el patrón: ' + patron);
        }
    };

    if (loading) return <div className="card"><div className="loading"><div style={{fontSize:'48px'}}>⏳</div><p>Cargando órdenes...</p></div></div>;

    if (!orders.length) return (
        <div className="card">
            <div className="empty-state">
                <div style={{fontSize:'64px',marginBottom:'20px'}}>🔧</div>
                <h3>No hay órdenes registradas</h3>
                <p>Creá tu primera orden de trabajo</p>
                <button className="btn btn-primary" style={{marginTop:'20px'}} onClick={onNew}>➕ Nueva Orden</button>
            </div>
        </div>
    );

    return (
        <div>
            <button className="btn btn-primary btn-full" style={{marginBottom:'20px'}} onClick={onNew}>➕ Nueva Orden de Trabajo</button>
            {orders.map(o => (
                <div key={o.firestoreId||o.id} className="order-card">
                    <div onClick={() => onEdit(o)} style={{cursor:'pointer'}}>
                        <div className="order-header">
                            <div className="order-title">{o.otNumber} — {o.nroSerie || 'Sin serie'}</div>
                            <span className={`order-badge ${o.status === 'complete' ? 'badge-complete' : 'badge-draft'}`}>
                                {o.status === 'complete' ? 'Completo' : 'Borrador'}
                            </span>
                        </div>
                        <div className="order-details">
                            <div><span className="detail-label">Cliente:</span> {o.cliente || '-'}</div>
                            <div><span className="detail-label">Marca:</span> {o.marca || '-'}</div>
                            <div><span className="detail-label">Modelo:</span> {o.modelo || '-'}</div>
                            <div><span className="detail-label">Fecha:</span> {o.fecha || '-'}</div>
                            <div><span className="detail-label">Presión:</span> {o.presion ? o.presion+' BAR' : '-'}</div>
                            <div><span className="detail-label">Fluido:</span> {o.fluido || '-'}</div>
                            <div><span className="detail-label">Patrón:</span> {o.patron || '-'}</div>
                        </div>
                        {(o.ordenVenta || o.nroRemito) && (
                            <div style={{marginTop:'10px', padding:'8px 12px', background:'#FFF8E1', borderRadius:'8px', display:'flex', gap:'20px', fontSize:'13px'}}>
                                {o.ordenVenta && <span>🔒 <strong>OV:</strong> {o.ordenVenta}</span>}
                                {o.nroRemito && <span>🔒 <strong>Remito:</strong> {o.nroRemito}</span>}
                            </div>
                        )}
                    </div>
                    {o.patron && (
                        <div style={{marginTop:'12px', borderTop:'1px solid #eee', paddingTop:'12px'}}>
                            <button 
                                className="btn" 
                                style={{width:'100%', padding:'12px', background:'#004E89', color:'white', fontWeight:'600'}}
                                onClick={(e) => {
                                    e.stopPropagation();
                                    descargarCertificadoPatron(o.patron);
                                }}
                            >
                                📜 Descargar Certificado del Patrón
                            </button>
                        </div>
                    )}
                </div>
            ))}
        </div>
    );
}

// App
function App() {
    const [tab, setTab] = useState('list');
    const [editing, setEditing] = useState(null);
    const [toast, setToast] = useState(null);
    const [online, setOnline] = useState(navigator.onLine);

    useEffect(() => {
        const on = () => setOnline(true);
        const off = () => setOnline(false);
        window.addEventListener('online', on);
        window.addEventListener('offline', off);
        return () => { window.removeEventListener('online', on); window.removeEventListener('offline', off); };
    }, []);

    const showToast = (msg, type = 'success') => setToast({ msg, type });

    const handleSave = async (order) => {
        const ok = await Storage.saveOrder(order);
        if (ok) {
            showToast(order.status === 'draft' ? '💾 Borrador guardado' : '✅ Orden completada');
            setTab('list'); setEditing(null);
        } else {
            showToast('Error al guardar', 'error');
        }
    };

    return (
        <div className="app-container">
            <div className="app-header">
                <h1>ValvuCheck</h1>
                <div className="subtitle">Sistema de Calibración Digital de Válvulas</div>
                <div className="sync-status">
                    <div className="sync-dot" style={{background: online ? '#06D6A0' : '#FFB800'}}></div>
                    {online ? 'Sincronizado ☁️' : 'Offline'}
                </div>
            </div>

            <div className="nav-tabs">
                <button className={`nav-tab ${tab==='list'?'active':''}`} onClick={() => setTab('list')}>📋 Órdenes</button>
                <button className={`nav-tab ${tab==='new'?'active':''}`} onClick={() => { setEditing(null); setTab('new'); }}>➕ Nueva OT</button>
            </div>

            {tab === 'list'
                ? <OrdersList onNew={() => { setEditing(null); setTab('new'); }} onEdit={o => { setEditing(o); setTab('new'); }} />
                : <NewOrderForm onSave={handleSave} editingOrder={editing} />
            }

            {toast && <Toast message={toast.msg} type={toast.type} onClose={() => setToast(null)} />}
        </div>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
