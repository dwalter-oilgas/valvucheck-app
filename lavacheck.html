<script type="text/babel">
const { useState, useEffect } = React;

// Firebase Config
const firebaseConfig = {
    apiKey: "AIzaSyCROCn8bb41my-b5Yj4anDBqgb-v-SfhB0",
    authDomain: "valvucheck.firebaseapp.com",
    projectId: "valvucheck",
    storageBucket: "valvucheck.firebasestorage.app",
    messagingSenderId: "550814428039",
    appId: "1:550814428039:web:9ec559c1a52a2f47340122"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// Cloudinary Config (GRATIS - mismo que ValvuCheck)
const CLOUD_NAME = 'dfixfq9s2';
const UPLOAD_PRESET = 'unsigned_preset';

// EmailJS init (usuario debe configurar)
emailjs.init("YOUR_PUBLIC_KEY");

// Subir foto a Cloudinary (SIN comprimir - calidad original)
const uploadPhotoToCloudinary = async (file) => {
    try {
        const fd = new FormData();
        fd.append('file', file);
        fd.append('upload_preset', UPLOAD_PRESET);
        fd.append('folder', 'lavacheck'); // Organizar en carpeta
        
        const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
            method: 'POST',
            body: fd
        });
        
        const data = await res.json();
        return data.secure_url; // URL de la foto
    } catch (error) {
        console.error('Error subiendo a Cloudinary:', error);
        throw error;
    }
};

// Helper para convertir foto a base64 (SOLO para vista previa offline)
const fileToBase64Preview = (file) => new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
});

// Storage
const Storage = {
    getInformes: (cb) => db.collection('lavados').onSnapshot(snap => {
        const informes = [];
        snap.forEach(doc => informes.push({ ...doc.data(), firestoreId: doc.id }));
        informes.sort((a, b) => new Date(b.updatedAt||0) - new Date(a.updatedAt||0));
        cb(informes);
    }, () => cb([])),

    saveInforme: async (informe) => {
        try {
            const clean = JSON.parse(JSON.stringify(informe, (k,v) => v === undefined ? '' : v));
            
            // Verificar tamaño aproximado (Firebase límite: 1MB)
            const size = JSON.stringify(clean).length;
            const sizeMB = (size / 1024 / 1024).toFixed(2);
            console.log(`📦 Tamaño del informe: ${sizeMB}MB`);
            
            if (size > 1000000) { // ~1MB
                const totalFotos = (clean.fotosPrevio || []).filter(f => f).length + 
                                   (clean.fotosPosterior || []).filter(f => f).length;
                alert(`⚠️ El informe es muy pesado (${sizeMB}MB).\n\nReduce la cantidad de fotos (tenés ${totalFotos}) o sacá fotos de menor resolución.`);
                return false;
            }
            
            if (informe.firestoreId) {
                await db.collection('lavados').doc(informe.firestoreId).set(clean);
            } else {
                await db.collection('lavados').add(clean);
            }
            return true;
        } catch (e) {
            if (e.message.includes('exceeds the maximum allowed size')) {
                alert('❌ Error: El informe tiene demasiadas fotos.\n\nReducí la cantidad de fotos o sacá fotos de menor resolución.');
            } else {
                alert('❌ Error al guardar: ' + e.message);
            }
            return false;
        }
    }
};

// Componente Formulario
function InformeForm({ onSave, editing }) {
    const empty = {
        id: Date.now(),
        numeroInforme: `LV-${Date.now().toString().slice(-6)}`,
        fecha: new Date().toISOString().split('T')[0],
        pozo: '',
        equipo: '',
        servicios: [], // LAVADO, ASPIRADO, SANEO, ASPIRADO RADIADOR
        fotosPrevio: Array(10).fill(''),
        fotosPosterior: Array(10).fill(''),
        remito: '',
        residuos: [
            { tipo: 'Suelo contaminado con Hidrocarburos', cantidad: '', disposicion: '' },
            { tipo: 'Solidos contaminado con Hidrocarburos', cantidad: '', disposicion: '' },
            { tipo: 'Agua Contaminada con Hidrocarburos', cantidad: '', disposicion: '' },
            { tipo: 'Otro', cantidad: '', disposicion: '' }
        ],
        status: 'draft',
        updatedAt: new Date().toISOString()
    };

    const [form, setForm] = useState(editing || empty);
    const [saving, setSaving] = useState(false);
    const [uploading, setUploading] = useState(false);

    // Autoguardar en localStorage cada vez que cambia el form
    useEffect(() => {
        if (!editing && form.id) {
            localStorage.setItem('lavacheck_draft', JSON.stringify(form));
        }
    }, [form, editing]);

    // Recuperar borrador al montar - AUTOMÁTICO
    useEffect(() => {
        if (!editing) {
            const draft = localStorage.getItem('lavacheck_draft');
            if (draft) {
                try {
                    const parsed = JSON.parse(draft);
                    // Solo recuperar si es de hoy
                    const draftDate = new Date(parsed.updatedAt).toDateString();
                    const today = new Date().toDateString();
                    if (draftDate === today) {
                        console.log('✅ Recuperando borrador automáticamente');
                        setForm(parsed);
                    } else {
                        localStorage.removeItem('lavacheck_draft');
                    }
                } catch (e) {
                    console.error('Error al recuperar borrador:', e);
                    localStorage.removeItem('lavacheck_draft');
                }
            }
        }
    }, [editing]);

    const set = (field, value) => setForm(prev => ({ ...prev, [field]: value }));

    const handlePhotoUpload = async (type, index, file) => {
        if (!file) return;
        
        const sizeMB = (file.size / 1024 / 1024).toFixed(2);
        console.log('📸 Foto seleccionada:', file.name, 'Tamaño:', sizeMB + 'MB');
        setUploading(true);
        
        try {
            // Guardar vista previa en base64 para mostrar mientras está offline
            const preview = await fileToBase64Preview(file);
            
            const field = type === 'previo' ? 'fotosPrevio' : 'fotosPosterior';
            const newPhotos = [...form[field]];
            
            // Guardar objeto con el File original y la vista previa
            newPhotos[index] = {
                preview: preview,  // Para mostrar en la UI
                file: file,        // Archivo original para subir después
                uploaded: false    // Indica si ya se subió a Storage
            };
            
            const newForm = { ...form, [field]: newPhotos, updatedAt: new Date().toISOString() };
            setForm(newForm);
            
            // Guardar en localStorage (solo preview, no el File)
            const formToSave = {
                ...newForm,
                [field]: newPhotos.map(p => p ? { preview: p.preview, uploaded: p.uploaded } : '')
            };
            localStorage.setItem('lavacheck_draft', JSON.stringify(formToSave));
            
            console.log('✅ Foto lista para subir (' + sizeMB + 'MB en calidad original)');
        } catch (e) {
            console.error('❌ Error al cargar foto:', e);
            alert('Error al cargar foto: ' + e.message);
        }
        
        setUploading(false);
    };

    const removePhoto = (type, index) => {
        const field = type === 'previo' ? 'fotosPrevio' : 'fotosPosterior';
        const newPhotos = [...form[field]];
        newPhotos[index] = '';
        set(field, newPhotos);
        
        // Actualizar localStorage
        const formToSave = { ...form, [field]: newPhotos };
        localStorage.setItem('lavacheck_draft', JSON.stringify(formToSave));
    };

    const handleRemitoUpload = async (file) => {
        if (!file) return;
        if (file.type !== 'application/pdf') {
            alert('Solo se permiten archivos PDF');
            return;
        }
        
        // Validar tamaño ANTES de convertir
        const sizeMB = file.size / 1024 / 1024;
        if (sizeMB > 0.5) {
            alert(`El PDF es muy grande (${sizeMB.toFixed(1)}MB). Máximo 500KB.\n\nPor favor comprímelo en:\nhttps://www.ilovepdf.com/compress_pdf`);
            return;
        }
        
        setUploading(true);
        try {
            const base64 = await fileToBase64(file);
            set('remito', base64);
            console.log('✅ Remito cargado:', (base64.length / 1024).toFixed(0) + 'KB');
        } catch (e) {
            alert('Error al cargar remito: ' + e.message);
        }
        setUploading(false);
    };

    const handleSave = async (draft = false) => {
        setSaving(true);
        
        try {
            console.log('💾 Iniciando guardado...');
            
            // 1. Subir fotos a Storage (si hay internet)
            const fotosPrevioURLs = [];
            const fotosPosteriorURLs = [];
            
            let online = navigator.onLine;
            
            if (online) {
                console.log('🌐 Hay internet - Subiendo fotos a Cloudinary...');
                
                // Subir fotos PREVIO
                for (let i = 0; i < form.fotosPrevio.length; i++) {
                    const foto = form.fotosPrevio[i];
                    if (foto && foto.file) {
                        console.log(`📤 Subiendo foto previo ${i+1}...`);
                        const url = await uploadPhotoToCloudinary(foto.file);
                        fotosPrevioURLs.push(url);
                    } else if (foto && typeof foto === 'string') {
                        // Ya es una URL
                        fotosPrevioURLs.push(foto);
                    } else {
                        fotosPrevioURLs.push('');
                    }
                }
                
                // Subir fotos POSTERIOR
                for (let i = 0; i < form.fotosPosterior.length; i++) {
                    const foto = form.fotosPosterior[i];
                    if (foto && foto.file) {
                        console.log(`📤 Subiendo foto posterior ${i+1}...`);
                        const url = await uploadPhotoToCloudinary(foto.file);
                        fotosPosteriorURLs.push(url);
                    } else if (foto && typeof foto === 'string') {
                        fotosPosteriorURLs.push(foto);
                    } else {
                        fotosPosteriorURLs.push('');
                    }
                }
                
                console.log('✅ Fotos subidas a Cloudinary');
            } else {
                // Sin internet - guardar en cola para sincronizar después
                alert('⚠️ Sin internet.\n\nEl informe se guardará localmente y se sincronizará cuando haya conexión.');
                
                // Guardar pendiente de sincronización
                const pending = JSON.parse(localStorage.getItem('lavacheck_pending') || '[]');
                pending.push({
                    ...form,
                    status: draft ? 'draft' : 'complete',
                    updatedAt: new Date().toISOString(),
                    pendingSync: true
                });
                localStorage.setItem('lavacheck_pending', JSON.stringify(pending));
                localStorage.removeItem('lavacheck_draft');
                
                alert('💾 Informe guardado localmente.\nSe sincronizará cuando tengas internet.');
                setSaving(false);
                return;
            }
            
            // 2. Guardar documento en Firestore (solo URLs, no archivos grandes)
            const informeToSave = {
                ...form,
                fotosPrevio: fotosPrevioURLs,
                fotosPosterior: fotosPosteriorURLs,
                status: draft ? 'draft' : 'complete',
                updatedAt: new Date().toISOString()
            };
            
            const success = await onSave(informeToSave);
            if (success) {
                localStorage.removeItem('lavacheck_draft');
                console.log('✅ Informe guardado exitosamente');
            }
        } catch (error) {
            console.error('❌ Error al guardar:', error);
            alert('Error al guardar: ' + error.message);
        }
        
        setSaving(false);
    };

    const sendEmail = async () => {
        const email = prompt('Email destinatario:');
        if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
            alert('Email inválido');
            return;
        }
        
        setUploading(true);
        try {
            const fotosHTML = form.fotosPrevio.concat(form.fotosPosterior).filter(f => f)
                .map(url => `<img src="${url}" style="width:300px; margin:10px;">`).join('');
            
            await emailjs.send('YOUR_SERVICE_ID', 'YOUR_TEMPLATE_ID', {
                to_email: email,
                subject: `Informe ${form.numeroInforme} - ${form.equipo}`,
                message_html: `<h2>Informe de Lavado ${form.numeroInforme}</h2>
                    <p><b>Fecha:</b> ${form.fecha}</p>
                    <p><b>Pozo:</b> ${form.pozo}</p>
                    <p><b>Equipo:</b> ${form.equipo}</p>
                    <h3>Fotografías:</h3>
                    ${fotosHTML}`,
                from_name: 'DARIO WALTER',
                reply_to: 'nicolas.dwalter@gmail.com'
            });
            
            alert('✅ Email enviado');
        } catch (e) {
            alert('❌ Error. Configure EmailJS primero.');
        }
        setUploading(false);
    };

    const generatePDF = () => {
        const w = window.open('', '_blank');
        
        let fotosPrevioHTML = '';
        const previo = form.fotosPrevio.filter(f => f);
        for (let i = 0; i < previo.length; i += 2) {
            const img1 = previo[i];
            const img2 = previo[i + 1];
            fotosPrevioHTML += `<div style="display:grid; grid-template-columns:1fr${img2 ? ' 1fr' : ''}; gap:10px; margin-bottom:10px;">
                <img src="${img1}" style="width:100%; border:1px solid #ddd;">
                ${img2 ? `<img src="${img2}" style="width:100%; border:1px solid #ddd;">` : ''}
            </div>`;
        }
        
        let fotosPosteriorHTML = '';
        const posterior = form.fotosPosterior.filter(f => f);
        for (let i = 0; i < posterior.length; i += 2) {
            const img1 = posterior[i];
            const img2 = posterior[i + 1];
            fotosPosteriorHTML += `<div style="display:grid; grid-template-columns:1fr${img2 ? ' 1fr' : ''}; gap:10px; margin-bottom:10px;">
                <img src="${img1}" style="width:100%; border:1px solid #ddd;">
                ${img2 ? `<img src="${img2}" style="width:100%; border:1px solid #ddd;">` : ''}
            </div>`;
        }
        
        const html = `<!DOCTYPE html><html><head><meta charset="UTF-8">
<title>Informe ${form.numeroInforme}</title>
<style>
@page { size: A4; margin: 12mm; }

.header-left { font-size: 28pt; font-weight: 900; color: #0066cc; }
.header-title { text-align: right; }
.header-title h1 { font-size: 12pt; margin: 0; }
.header-title .subtitle { font-weight: 600; margin: 3px 0; font-size: 11pt; }
.codigo { font-size: 9pt; margin-top: 5px; }
.main-title { text-align: center; background: #e6f2ff; padding: 10px; font-weight: 700; font-size: 13pt; margin: 15px 0; border: 2px solid #0066cc; }
.info-table { width: 100%; border-collapse: collapse; margin: 15px 0; }
.info-table th { background: #0066cc; color: white; padding: 8px; border: 2px solid #0066cc; }
.info-table td { border: 2px solid #0066cc; padding: 8px; text-align: center; }
.photo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 3px; margin: 15px 0; }
.photo-column { border: 2px solid #0066cc; padding: 8px; }
.photo-column h3 { text-align: center; background: #e6f2ff; padding: 6px; margin: -8px -8px 8px -8px; font-size: 10pt; }

@media print { .no-print { display: none; } }
</style></head><body>

<div class="header">
    <div class="header-left">GALILEO</div>
    <div class="header-title">
        <h1>PROCEDIMIENTOS PARTICULARES</h1>
        <div class="subtitle">LAVADO DE EQUIPOS MOTOCOMPRESORES – ANEXO 1</div>
        <div class="codigo">Cód: GG-PP-OyS-163-A01<br>Revisión: 01<br>Fecha: ${form.fecha.split('-').reverse().join('/')}</div>
    </div>
</div>

<div class="main-title">INFORME DE LAVADO Y/O SANEO</div>

<table class="info-table">
    <tr>
        <th>Fecha</th>
        <th>Pozo – Sector - Planta</th>
        <th>Equipo</th>
    </tr>
    <tr>
        <td>${form.fecha.split('-').reverse().join('/')}</td>
        <td>${form.pozo}</td>
        <td>${form.equipo}</td>
    </tr>
</table>

<div class="photo-grid">
    <div class="photo-column">
        <h3>IMÁGENES / DETALLES PREVIO AL LAVADO / SANEO</h3>
        ${fotosPrevioHTML || '<p style="text-align:center; color:#999;">Sin fotos</p>'}
    </div>
    <div class="photo-column">
        <h3>IMÁGENES / DETALLES POSTERIOR AL LAVADO / SANEO</h3>
        ${fotosPosteriorHTML || '<p style="text-align:center; color:#999;">Sin fotos</p>'}
    </div>
</div>

<div style="page-break-before: always;"></div>

<div class="header">
    <div class="header-left">GALILEO</div>
    <div class="header-title">
        <h1>PROCEDIMIENTOS PARTICULARES</h1>
        <div class="subtitle">LAVADO DE EQUIPOS MOTOCOMPRESORES – ANEXO 1</div>
        <div class="codigo">Pág 2 de 2</div>
    </div>
</div>

<table class="info-table" style="margin-top:30px;">
    <tr>
        <th>Residuos Generados</th>
        <th>Cantidad</th>
        <th>Sitio / Fecha / Hora de disposición final</th>
    </tr>
    ${form.residuos.map(r => `<tr><td style="text-align:left; padding-left:10px;">${r.tipo}</td><td>${r.cantidad || ''}</td><td>${r.disposicion || ''}</td></tr>`).join('')}
</table>

<div style="margin-top:60px; text-align:center;">
    <div style="border-top:2px solid #000; display:inline-block; padding-top:8px; min-width:400px;">
        Firma de Referente de Empresa de Lavado y/o Saneo
    </div>
</div>

<button class="no-print" onclick="window.print()">🖨️ Imprimir PDF</button>
</body></html>`;
        w.document.write(html);
        w.document.close();
    };

    return (
        <div>
            <div className="card">
                <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'20px'}}>
                    <h2>📋 Datos del Informe</h2>
                    <div style={{display:'flex', gap:'8px', alignItems:'center'}}>
                        <small style={{color:'#28a745', fontSize:'12px'}}>💾 Guardado automático</small>
                        <button 
                            onClick={() => {
                                if (confirm('¿Descartar borrador y empezar nuevo?')) {
                                    localStorage.removeItem('lavacheck_draft');
                                    setForm(empty);
                                }
                            }}
                            style={{padding:'4px 8px', fontSize:'11px', background:'#dc3545', color:'white', border:'none', borderRadius:'4px', cursor:'pointer'}}
                        >
                            🗑️ Limpiar
                        </button>
                    </div>
                </div>
                <div className="form-row">
                    <div className="form-group">
                        <label className="form-label">N° Informe</label>
                        <input className="form-input" value={form.numeroInforme} readOnly style={{background:'#f5f5f5'}} />
                    </div>
                    <div className="form-group">
                        <label className="form-label">Fecha</label>
                        <input type="date" className="form-input" value={form.fecha} onChange={e => set('fecha', e.target.value)} />
                    </div>
                    <div className="form-group">
                        <label className="form-label">Equipo</label>
                        <input className="form-input" value={form.equipo} onChange={e => set('equipo', e.target.value)} placeholder="MP 777" />
                    </div>
                </div>
                <div className="form-group">
                    <label className="form-label">Pozo - Sector - Planta</label>
                    <input className="form-input" value={form.pozo} onChange={e => set('pozo', e.target.value)} placeholder="EPF1" />
                </div>
                <div className="form-group">
                    <label className="form-label">Tipo de Servicio</label>
                    <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'12px', marginTop:'8px'}}>
                        {['LAVADO', 'ASPIRADO', 'SANEO', 'ASPIRADO RADIADOR'].map(servicio => (
                            <label key={servicio} style={{display:'flex', alignItems:'center', gap:'8px', padding:'12px', background:'#f8f9fa', borderRadius:'8px', cursor:'pointer', border: form.servicios.includes(servicio) ? '2px solid #0066cc' : '2px solid #ddd'}}>
                                <input 
                                    type="checkbox" 
                                    checked={form.servicios.includes(servicio)}
                                    onChange={e => {
                                        const newServicios = e.target.checked 
                                            ? [...form.servicios, servicio]
                                            : form.servicios.filter(s => s !== servicio);
                                        set('servicios', newServicios);
                                    }}
                                    style={{width:'18px', height:'18px', cursor:'pointer'}}
                                />
                                <span style={{fontWeight:'600', fontSize:'14px'}}>{servicio}</span>
                            </label>
                        ))}
                    </div>
                </div>
            </div>

            <div className="card">
                <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'20px'}}>
                    <div>
                        <h2>📸 Fotografías</h2>
                        <small style={{color:'#666', fontSize:'12px'}}>
                            {(() => {
                                const totalFotos = form.fotosPrevio.filter(f => f).length + form.fotosPosterior.filter(f => f).length;
                                const color = totalFotos > 15 ? '#ff6600' : '#28a745';
                                return <span style={{color}}>
                                    {totalFotos} fotos subidas {totalFotos > 15 && '⚠️ (Reducí para evitar errores)'}
                                </span>;
                            })()}
                        </small>
                    </div>
                    {uploading && <span style={{color:'#ff6600', fontWeight:'bold'}}>⏳ Procesando foto...</span>}
                </div>
                <div className="photo-grid">
                    <div className="photo-column">
                        <h3>🔴 PREVIO AL LAVADO</h3>
                        {form.fotosPrevio.map((foto, i) => (
                            <div key={i} className="photo-slot">
                                {foto ? (
                                    <div className="remove-btn">
                                        <img src={foto.preview || foto} className="photo-preview" alt={`Previo ${i+1}`} />
                                        <button onClick={() => removePhoto('previo', i)}>✕</button>
                                    </div>
                                ) : (
                                    <div className="photo-placeholder">
                                        <div style={{fontSize:'48px'}}>📷</div>
                                        <div style={{marginTop:'8px', marginBottom:'12px', fontWeight:'600'}}>Foto {i+1}</div>
                                        <div style={{display:'flex', gap:'8px', flexDirection:'column'}}>
                                            <label className="photo-btn camera-btn">
                                                📸 Cámara
                                                <input 
                                                    type="file" 
                                                    accept="image/*" 
                                                    capture="environment"
                                                    style={{display:'none'}}
                                                    onChange={e => {
                                                        if (e.target.files && e.target.files[0]) {
                                                            handlePhotoUpload('previo', i, e.target.files[0]);
                                                        }
                                                    }} 
                                                />
                                            </label>
                                            <label className="photo-btn gallery-btn">
                                                🖼️ Galería
                                                <input 
                                                    type="file" 
                                                    accept="image/*"
                                                    style={{display:'none'}}
                                                    onChange={e => {
                                                        if (e.target.files && e.target.files[0]) {
                                                            handlePhotoUpload('previo', i, e.target.files[0]);
                                                        }
                                                    }} 
                                                />
                                            </label>
                                        </div>
                                    </div>
                                )}
                            </div>
                        ))}
                    </div>
                    <div className="photo-column">
                        <h3>🟢 POSTERIOR AL LAVADO</h3>
                        {form.fotosPosterior.map((foto, i) => (
                            <div key={i} className="photo-slot">
                                {foto ? (
                                    <div className="remove-btn">
                                        <img src={foto.preview || foto} className="photo-preview" alt={`Posterior ${i+1}`} />
                                        <button onClick={() => removePhoto('posterior', i)}>✕</button>
                                    </div>
                                ) : (
                                    <div className="photo-placeholder">
                                        <div style={{fontSize:'48px'}}>📷</div>
                                        <div style={{marginTop:'8px', marginBottom:'12px', fontWeight:'600'}}>Foto {i+1}</div>
                                        <div style={{display:'flex', gap:'8px', flexDirection:'column'}}>
                                            <label className="photo-btn camera-btn">
                                                📸 Cámara
                                                <input 
                                                    type="file" 
                                                    accept="image/*" 
                                                    capture="environment"
                                                    style={{display:'none'}}
                                                    onChange={e => {
                                                        if (e.target.files && e.target.files[0]) {
                                                            handlePhotoUpload('posterior', i, e.target.files[0]);
                                                        }
                                                    }} 
                                                />
                                            </label>
                                            <label className="photo-btn gallery-btn">
                                                🖼️ Galería
                                                <input 
                                                    type="file" 
                                                    accept="image/*"
                                                    style={{display:'none'}}
                                                    onChange={e => {
                                                        if (e.target.files && e.target.files[0]) {
                                                            handlePhotoUpload('posterior', i, e.target.files[0]);
                                                        }
                                                    }} 
                                                />
                                            </label>
                                        </div>
                                    </div>
                                )}
                            </div>
                        ))}
                    </div>
                </div>
            </div>

            <div className="card">
                <h2 style={{marginBottom:'20px'}}>🗑️ Residuos Generados</h2>
                {form.residuos.map((r, i) => (
                    <div key={i} style={{marginBottom:'20px'}}>
                        <label className="form-label">{r.tipo}</label>
                        <div style={{display:'grid', gridTemplateColumns:'1fr 2fr', gap:'12px'}}>
                            <input className="form-input" placeholder="Cantidad" value={r.cantidad} onChange={e => {
                                const newR = [...form.residuos];
                                newR[i].cantidad = e.target.value;
                                set('residuos', newR);
                            }} />
                            <input className="form-input" placeholder="Sitio / Fecha / Hora" value={r.disposicion} onChange={e => {
                                const newR = [...form.residuos];
                                newR[i].disposicion = e.target.value;
                                set('residuos', newR);
                            }} />
                        </div>
                    </div>
                ))}
            </div>

            <div className="card">
                <h2 style={{marginBottom:'20px'}}>📎 Adjuntar Remito (opcional)</h2>
                {form.remito ? (
                    <div style={{display:'flex', alignItems:'center', gap:'12px'}}>
                        <div style={{flex:1, padding:'14px', background:'#e8f5e9', borderRadius:'8px'}}>
                            <span style={{fontSize:'24px'}}>📄</span> <strong>Remito adjunto</strong>
                        </div>
                        <button className="btn btn-secondary" onClick={() => set('remito', '')}>✕ Quitar</button>
                    </div>
                ) : (
                    <label style={{display:'block', padding:'30px', border:'2px dashed #ddd', borderRadius:'8px', textAlign:'center', cursor:'pointer'}}>
                        <div style={{fontSize:'48px'}}>📄</div>
                        <div style={{fontWeight:'600', marginTop:'8px'}}>Click para adjuntar PDF</div>
                        <input type="file" accept="application/pdf" style={{display:'none'}} onChange={e => handleRemitoUpload(e.target.files[0])} />
                    </label>
                )}
            </div>

            <div className="buttons">
                <button className="btn btn-secondary" style={{flex:1}} onClick={() => handleSave(true)} disabled={saving || uploading}>
                    {saving ? '⏳...' : '💾 Borrador'}
                </button>
                <button className="btn btn-success" style={{flex:1}} onClick={generatePDF} disabled={uploading}>
                    📄 PDF
                </button>
                <button className="btn btn-warning" style={{flex:1}} onClick={sendEmail} disabled={uploading}>
                    📧 Email
                </button>
                <button className="btn btn-primary" style={{flex:1}} onClick={() => handleSave(false)} disabled={saving || uploading}>
                    {saving ? '⏳...' : '✓ Completar'}
                </button>
            </div>
        </div>
    );
}

// Lista
function InformesList({ onNew, onEdit }) {
    const [informes, setInformes] = useState([]);
    const [loading, setLoading] = useState(true);
    const [exporting, setExporting] = useState(false);

    useEffect(() => {
        const unsub = Storage.getInformes(i => { setInformes(i); setLoading(false); });
        return () => unsub();
    }, []);

    const exportToExcel = () => {
        setExporting(true);
        
        try {
            // Crear contenido CSV
            const headers = ['N° Informe', 'Fecha', 'Pozo/Sector/Planta', 'Equipo', 'Servicios', 'Cantidad Fotos Previo', 'Cantidad Fotos Posterior', 'Estado'];
            
            const rows = informes.map(inf => [
                inf.numeroInforme || '',
                inf.fecha || '',
                inf.pozo || '',
                inf.equipo || '',
                (inf.servicios || []).join(', '),
                (inf.fotosPrevio || []).filter(f => f).length,
                (inf.fotosPosterior || []).filter(f => f).length,
                inf.status === 'complete' ? 'Completo' : 'Borrador'
            ]);
            
            // Convertir a CSV
            const csv = [
                headers.join(','),
                ...rows.map(row => row.map(cell => `"${cell}"`).join(','))
            ].join('\n');
            
            // Crear archivo y descargar
            const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            const fecha = new Date().toISOString().split('T')[0];
            
            link.setAttribute('href', url);
            link.setAttribute('download', `LAVADOS_${fecha}.csv`);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            alert('✅ Excel exportado exitosamente');
        } catch (e) {
            alert('❌ Error al exportar: ' + e.message);
        }
        
        setExporting(false);
    };

    if (loading) return <div className="card"><div className="empty-state"><h3>Cargando...</h3></div></div>;

    if (!informes.length) return (
        <div className="card">
            <div className="empty-state">
                <div style={{fontSize:'64px'}}>💧</div>
                <h3>No hay informes</h3>
                <button className="btn btn-primary" style={{marginTop:'20px'}} onClick={onNew}>➕ Crear Informe</button>
            </div>
        </div>
    );

    return (
        <div>
            <div style={{display:'flex', gap:'12px', marginBottom:'20px'}}>
                <button className="btn btn-primary" style={{flex:1}} onClick={onNew}>
                    ➕ Nuevo Informe
                </button>
                <button className="btn btn-success" style={{flex:1}} onClick={exportToExcel} disabled={exporting}>
                    {exporting ? '⏳ Exportando...' : '📊 Exportar Excel'}
                </button>
            </div>
            {informes.map(inf => (
                <div key={inf.firestoreId||inf.id} className="informe-card" onClick={() => onEdit(inf)}>
                    <div style={{display:'flex', justifyContent:'space-between', marginBottom:'12px'}}>
                        <strong style={{fontSize:'18px'}}>{inf.numeroInforme} — {inf.equipo}</strong>
                        <span style={{padding:'4px 12px', borderRadius:'12px', fontSize:'12px', fontWeight:'600', background: inf.status==='complete'?'#d4edda':'#fff3cd'}}>
                            {inf.status === 'complete' ? 'Completo' : 'Borrador'}
                        </span>
                    </div>
                    <div style={{fontSize:'14px', color:'#666'}}>
                        <strong>Fecha:</strong> {inf.fecha} | <strong>Pozo:</strong> {inf.pozo}
                        {inf.servicios && inf.servicios.length > 0 && (
                            <div style={{marginTop:'8px'}}>
                                <strong>Servicios:</strong> {inf.servicios.join(', ')}
                            </div>
                        )}
                    </div>
                </div>
            ))}
        </div>
    );
}

// App
function App() {
    const [tab, setTab] = useState('list');
    const [editing, setEditing] = useState(null);

    const handleSave = async (informe) => {
        const ok = await Storage.saveInforme(informe);
        if (ok) {
            alert(informe.status === 'draft' ? '💾 Guardado' : '✅ Completado');
            setTab('list');
            setEditing(null);
        }
        return ok;
    };

    return (
        <div className="container">
            <div className="header">
                <h1>💧 LavaCheck</h1>
                <div>Informes de Lavado de Equipos</div>
            </div>

            <div className="tabs">
                <div className={`tab ${tab==='list'?'active':''}`} onClick={() => setTab('list')}>📋 Informes</div>
                <div className={`tab ${tab==='new'?'active':''}`} onClick={() => { setEditing(null); setTab('new'); }}>➕ Nuevo</div>
            </div>

            {tab === 'list'
                ? <InformesList onNew={() => { setEditing(null); setTab('new'); }} onEdit={i => { setEditing(i); setTab('new'); }} />
                : <InformeForm onSave={handleSave} editing={editing} />
            }
        </div>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
